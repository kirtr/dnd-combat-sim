name: Champion GWF Orc L7
class: fighter
subclass: champion
level: 7
species: orc
background: soldier
origin_feat: alert
ability_scores:
  str: 18    # 16 base + 2 from L4 ASI
  dex: 14    # Initiative matters vs Alert Bladesinger
  con: 16
  int: 8
  wis: 14    # Better Polymorph saves (+2 vs their DC 16)
  cha: 8
weapons:
  - greatsword   # Graze mastery: miss still deals STR mod (4) damage
  - javelin
armor: plate    # AC 18 per L7 progression
shield: false
fighting_style: great_weapon_fighting
weapon_mastery:
  - graze        # Key vs high AC Bladesinger
tactic: aggressive
powers:
  - second_wind
  - action_surge
  - improved_critical    # Crits on 19-20
  - remarkable_athlete   # L6 Champion feature
  - relentless_endurance # Orc: drop to 1 HP instead of 0, 1/long rest
  - adrenaline_rush      # Orc: BA dash + temp HP
tags:
  - champion
  - fighter
  - gwf
  - level7
  - melee
  - orc
notes: |
  Anti-Bladesinger build. Optimized for the matchup but Polymorph hard-counters:
  - Alert competes on initiative (+7 vs their +8)
  - WIS 14 for best available Polymorph save (+2 vs DC 16 = 35% pass)
  - Relentless Endurance triggers 100% of fights, extends combat 1 round
  - Graze mastery forces concentration checks on misses (4 damage)
  - Orc Adrenaline Rush for temp HP buffer
  
  Reality: Bladesinger L7 beats ALL L7 builds 100% in this sim due to
  Polymorph + high concentration saves. The sim doesn't implement save
  proficiency bonuses, making WIS saves even worse than they should be.
  Best Champion build given constraints.
