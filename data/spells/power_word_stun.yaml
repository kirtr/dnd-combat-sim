description: "No attack roll or initial save. Automatically stuns one creature you
  can see within 60ft. While stunned: incapacitated, can't move, can only speak
  falteringly; automatically fails STR and DEX saves; attacks against it have
  advantage; any attack that hits is a critical hit (within 5ft). At the end of
  each of its turns, the target makes a CON save to end the stun. In sim:
  effect 'stun_no_save' — immediately stunned; CON save at end of each turn to end."
