description: "No attack roll or save. Concentration up to 1 minute. The target (self
  or a creature you touch) becomes invisible. Unlike regular invisibility, this doesn't
  end when the target attacks or casts spells. While invisible: the target has advantage
  on all attack rolls; attackers have disadvantage on attacks against the target."
