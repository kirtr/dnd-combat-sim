description: "CON save. Creatures with 100 or more HP automatically succeed (no
  effect). On fail: the target is wracked with intense pain. For the duration
  (until they make their save): can't take reactions; movement speed halved; at
  the start of each of its turns, the target makes another CON save — on failure,
  it can't take an action that turn. At the end of each turn, the target makes a
  CON save to end the effect on itself. In sim: effect 'pain' — target must make
  CON save each turn to take actions. Automatically fails if current HP ≥ 100."
auto_fail_hp_threshold: 100   # creatures with >= this HP auto-succeed (no effect)
