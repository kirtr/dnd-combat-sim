description: "CON save. On fail: target's hit point maximum is reduced to 1/3 of
  its maximum (hp_percentage_cap: 0.33); the target's current HP is reduced to match
  the new maximum if it was above that value. The target can't regain HP above this
  new maximum until it finishes a long rest. On success: 14d6 necrotic damage (half).
  In sim: on failed save, set target HP to floor(max_hp * 0.33), minimum 1. Immune
  creatures auto-succeed."
