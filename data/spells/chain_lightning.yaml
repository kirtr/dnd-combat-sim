description: "DEX save, 10d8 lightning (half on save). Primary target plus up to 3
  secondary targets within 30ft of the primary (each gets their own save). In 1v1
  sim: single target, full 10d8 lightning damage (secondary targets aren't available
  when there's only one enemy). The lightning bounces between targets; each target
  other than the primary must also make a DEX save."
upcast_note: "Upcast to L7+: one additional secondary target per slot level above 6th."
