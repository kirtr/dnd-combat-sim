description: "CON save, 12d6 radiant (half on save). 60ft radius burst. On a failed
  save, the target is also blinded. This blindness is permanent until removed by
  Lesser Restoration, Heal, or similar magic (unlike Sunbeam's temporary blindness).
  Undead and oozes have disadvantage on the save. In 1v1 sim: single target, full
  12d6 radiant damage, blinded on failed save."
