description: "INT save, 8d6 psychic damage (half on save). On a failed save, the
  target is also afflicted with psychic interference: for the next minute, it must
  subtract 1d6 from all attack rolls and ability checks (and concentration saves).
  At the end of each of its turns it can make another INT save to end this secondary
  effect. In sim: model secondary effect as -1d6 to attack rolls for 1 minute on
  failed save."
