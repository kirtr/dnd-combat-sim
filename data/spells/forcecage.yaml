description: "No attack roll or save to apply. An immovable cage of force springs
  into existence around any creature in the area (10ft cube or 20ft cage with bars).
  The creature is trapped automatically — no initial save. It can't leave by any
  means (no teleportation, no passing through walls). At the start of each of its
  turns, the creature makes a CHA save (DC = spell save DC) or wastes its action.
  Concentration up to 1 hour. In sim: effect 'banishment' — target loses its turn/
  attacks for the duration. Cannot be dispelled by counterspell (not a spell on
  target); can be dispelled by disintegrate or antimagic field."
