notes:
  sneak_attack_2024: 1d6 at levels 1-2. Once per turn. Requires finesse or ranged
    weapon. Need advantage OR ally within 5ft of target (ally not incapacitated, you
    not at disadvantage).
  cunning_action_2024: 'Bonus action: Dash, Disengage, or Hide.'
  weapon_mastery: 2 slots at level 1.
  steady_aim_2024: 'Level 3: BA to gain advantage on next attack, speed = 0 for turn.'
  ability_score_improvement_2024: 'Level 4: Ability Score Improvement or feat (declaration
    only in this chunk).'
  uncanny_dodge_2024: 'Level 5: reaction to halve damage from one attacker you can see
    (declaration only in this chunk).'
  expertise_2_2024: 'Level 6: two more skill proficiencies of your choice become
    expertise (double proficiency bonus).'
  evasion_2024: 'Level 7: on DEX saves for half damage, take 0 on success and half on failure.'
  use_magic_device_2024: 'Thief L6: ignore class, race, and level requirements on
    use of magic items.'
  magical_ambush_2024: 'Arcane Trickster L6: if hidden from creature when you cast
    a spell, that creature has disadvantage on saving throws against the spell this turn.'
  assassinate_2024: 'Assassin L3: advantage on attack rolls against creatures that
    have not yet taken a turn in combat. Attacks against surprised creatures auto-crit
    (treated as rolling a 20).'
  infiltration_expertise_2024: 'Assassin L3: you can unfailingly create false identities
    (not modeled in combat sim).'
  death_strike_2024: 'Assassin L9: when you auto-crit against a surprised target via
    Assassinate, the target must make CON save (DC = 8 + PB + DEX mod) or take double
    the damage from the attack.'
