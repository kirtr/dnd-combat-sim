notes:
  rage_2024: '2 uses at levels 1-2 (table p.51). Bonus action to enter. Duration:
    until end of combat or 10 rounds. +2 rage damage at levels 1-8. Resistance to
    B/P/S. Advantage on STR checks/saves. Cannot wear heavy armor while raging.'
  unarmored_defense: AC = 10 + DEX mod + CON mod when not wearing armor. Can use shield.
  reckless_attack_2024: 'First attack of turn: choose to attack recklessly. Advantage
    on STR-based melee attacks until start of next turn. Attacks against you have
    advantage.'
  danger_sense_2024: Advantage on DEX saves unless Incapacitated.
  weapon_mastery: 2 slots, melee Simple or Martial only. Can change on long rest.
  ability_score_improvement_2024: 'Level 4: Ability Score Improvement or feat (declaration
    only in this chunk).'
  extra_attack_2024: 'Level 5: Attack action includes one extra attack.'
  fast_movement_2024: 'Level 5: speed +10 while not wearing heavy armor.'
  mindless_rage_2024: 'Level 6: while raging, cannot be charmed or frightened.'
  feral_instinct_2024: 'Level 7: advantage on Initiative rolls. If surprised at start
    of combat, you can act normally on your first turn as long as you enter a Rage
    at the start of that turn.'
  totem_spirit_bear_l6_2024: 'Bear Totem L6 (Aspect of the Bear): your carrying
    capacity doubles; advantage on Strength checks and Strength saving throws.'
