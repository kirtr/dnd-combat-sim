features:
  1:
  - fighting_style
  - second_wind
  - weapon_mastery_fighter
  2:
  - action_surge
  - tactical_mind
  4:
  - ability_score_improvement
  5:
  - extra_attack
subclasses:
  battle_master:
    features:
      3:
      - combat_superiority
      - student_of_war
      6:
      - know_your_enemy
      10:
      - improved_combat_superiority
      15:
      - relentless
  champion:
    features:
      3:
      - improved_critical
