notes:
  martial_arts_2024: 'Use DEX for monk weapons (simple melee + martial light) and
    unarmed strikes. Martial Arts die = 1d6 at levels 1-4. Bonus action: one unarmed
    strike after attacking with monk weapon/unarmed.'
  unarmored_defense: AC = 10 + DEX mod + WIS mod when not wearing armor, no shield.
  focus_points_2024: Renamed from Ki. Points = monk level. Regain all on short/long
    rest.
  flurry_of_blows: '1 Focus Point, bonus action: 2 unarmed strikes (replaces martial
    arts BA strike).'
  patient_defense: 'Free: Disengage as BA. Or 1 Focus Point: both Disengage AND Dodge
    as BA.'
  step_of_the_wind: 'Free: Dash as BA. Or 1 Focus Point: Dash + Disengage as BA, doubled
    jump.'
  unarmored_movement: +10 ft speed at level 2 when not wearing armor or shield.
  uncanny_metabolism: 'On Initiative roll: regain all Focus Points, heal monk level
    + martial arts die. 1/long rest.'
  ability_score_improvement_2024: 'Level 4: Ability Score Improvement or feat (declaration
    only in this chunk).'
  slow_fall_2024: 'Level 4: reaction to reduce falling damage (declaration only in this
    chunk).'
  extra_attack_2024: 'Level 5: Attack action includes one extra attack.'
  stunning_strike_2024: 'Level 5: spend Focus Point to force CON save; target stunned
    on failure (declaration only in this chunk).'
  empowered_strikes_2024: 'Level 6: your unarmed strikes count as magical for the
    purpose of overcoming resistance and immunity to nonmagical attacks and damage.'
  evasion_2024: 'Level 7: when you are subjected to an effect that allows a DEX save
    for half damage, you take no damage on a success and half damage on a failure.'
  wholeness_of_body_2024: 'Open Hand L6: BA, expend 3 Focus Points to heal yourself
    for 3 × your Monk level hit points.'
  shadow_step_2024: 'Shadow Monk L6: BA to teleport from one area of dim light or
    darkness to another unoccupied space within 60ft that you can see that is also
    dim light or darkness. Your next melee attack before end of turn has advantage.'
